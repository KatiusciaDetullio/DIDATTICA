<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cena</title>
    <style>
        body { background-color: rgb(233, 214, 188);
               text-align: center;
               color: rgb(83, 42, 12);
        
        }
        p { font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: x-large;

        }
        #piatti {margin: auto;
                width: auto;
               
        }
       

    </style>
</head>
<body>
   <h1> Cosa c'è per cena?</h1>
    <label>Scegli cosa mangiare stasera</label>
    <select id="selection">
        <option value="seleziona">Seleziona un opzione...</option>
        <option value="sushi">Sushi</option>
        <option value="pizza">Pizza</option>
        <option value="hamburger">Hamburger</option>
    </select>
    <br><br>
    <input type="submit" value="invia" onclick="cena()">
    <hr>
    <p id="scrivi"></p><br>
    <img id="piatti" src="https://images.unsplash.com/photo-1682862279256-b2a9e4f3d22c?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mjd8fGN1Y2luYSUyMGRhbCUyMG1vbmRvfGVufDB8fDB8fHww" alt="immagine">
    
    <script>
        function cena() {
            const imgElement = document.getElementById ("piatti");
            var cibo = selection.value;
            // condizione 1
            if (cibo == "sushi") {
                    scrivi.innerHTML = "Il miglior ristorante Giapponese in zona è Sushi You";
                    imgElement.src = "https://plus.unsplash.com/premium_photo-1668146927669-f2edf6e86f6f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8c3VzaGl8ZW58MHx8MHx8fDA%3D";
                    imgElement.alt = "Sushi You"
            }
            // condizione 2
            else if (cibo == "pizza") {
                    scrivi.innerHTML = "Da Giò Giò la pizza è sublime";
                    imgElement.src = "https://images.unsplash.com/photo-1598023696416-0193a0bcd302?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzV8fHBpenphfGVufDB8fDB8fHww";
                    imgElement.alt = "Pizza giò giò"
            }
            //condizione 3 o altre 
            else {
                 scrivi.innerHTML = "Nel ristorante Greta gli Hamburger sono succulenti";
                 imgElement.src = "https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGhhbWJ1cmdlcnxlbnwwfHwwfHx8MA%3D%3D";
                 imgElement.alt = "Hamburger di Greta"
            }
          
        }
    </script>

    
</body>
</html>
