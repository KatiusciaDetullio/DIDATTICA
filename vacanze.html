<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacanze</title>
</head>
    <style>
       body { text-align: center;
              background-color: aliceblue;
               


        }
        #titolo {   text-align: center;
                    font-family: Georgia, 'Times New Roman', Times, serif;
                    color:rgb(255, 255, 255);
                    background-color: rgb(182, 207, 199);
                    border: 2px solid white;
                    -webkit-text-stroke: 1px rgb(12, 105, 105);



        }
        #vmare { text-align: center;
                font-family: Georgia, 'Times New Roman', Times, serif;
                color:blue;
                display: none;
        
        }

        #vmontagna { text-align: center;
                    font-family: Georgia, 'Times New Roman', Times, serif;
                    color:rgb(8, 77, 8); 
                    display: none;
        }

        #spiaggia { margin: auto;
                    width: 40%;
                    height: 450px;
                    display: none;


        }

        #monti {    width: 40%;
                    height: 450px;  
                    display: none;
                    margin: auto;
        } 


    </style>
<body onload="vacanze()">
    <h1 id="titolo">Goditi la tua vacanza</h1>
    <h2 id="vmare">Ottima scelta, ricordati la crema solare</h2>
    <h2 id="vmontagna"> Bellissimo posto per fare escursioni</h2>
    <img id="spiaggia" src="https://images.unsplash.com/photo-1509233725247-49e657c54213?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8c3BpYWdnaWF8ZW58MHx8MHx8fDA%3D" alt="spiaggia">
    <img id="monti" src="https://plus.unsplash.com/premium_photo-1674917000586-b7564f21540e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fG1vbnRhZ25hfGVufDB8fDB8fHww" alt="monti">
 
    <script>
        function vacanze() {
            var destinazione = prompt ("Mare o Montagna?","");
            //condizione verificata 
                if (destinazione == "mare")  {
                    vmare.style.display = "block";
                    spiaggia.style.display = "block";

                }  
            //condizione che non si è verificata
                else {
                    vmontagna.style.display = "block";
                    monti.style.display = "block";
                }




        }




    </script>
    
</body>
</html>
